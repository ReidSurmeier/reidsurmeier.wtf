<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 720" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Figure label top-left (original Japanese) -->
