  <rect x="105" y="492" width="145" height="34" rx="17" fill="none" stroke-width="2.2"/>
  <text x="120" y="514" font-family="var(--site-font), sans-serif" font-size="15" font-weight="500" fill="#222" stroke="none">Reid Surmeier</text>
